{% extends "users/basic.html" %}

{%block content%}
    <div class="container mt-4">
        <h2>Register</h2>
        <form method= "POST">
            {%csrf_token %}
            {{form.as_p}}
            <div>
                <button class= "btn btn-primary mt-2" types= "submit">Register</button>
            </div>
        </form>
        <p>Already have an account <a href= "{% url 'login' %}">Login here</a>.</p>
        
    </div>
{% endblock %}
