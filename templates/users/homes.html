{% extends "users/basic.html" %}

{%block content%}
<h1>Movies</h1>
<ul>
    {% for movie in  movies%}
    <li>
        <img src="{{movie.image.url}} alt = "image>
        <strong>{{movie.name}}</strong>{{movie.rating}}
        <p>Cast:{{movie.cast}}</p>
        <a href = "{% url 'theater_list' movie.id %}">View Theaters</a>
    </li>
    {% endfor %}
</ul>    
{% endblock %}
